backend:
  name: git-gateway
  branch: main

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: "general_settings"
    label: "General Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "data/general.json"
        fields:
          - { label: "Logo Text", name: "logo_text", widget: "string", default: "AL NOOR" }
          - { label: "Logo Subtitle", name: "logo_subtitle", widget: "string", default: "Photographer Studio & Color Lab" }
          - { label: "Hero Title", name: "hero_title", widget: "string", default: "Capturing Timeless Moments" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string", default: "Premium photography services at Mall of Lahore" }
          - { label: "Hero CTA Text", name: "hero_cta_text", widget: "string", default: "Explore Our Work" }
          - { label: "Founder Name", name: "founder_name", widget: "string" }
          - { label: "Founder Title", name: "founder_title", widget: "string" }
          - { label: "Founder Bio", name: "founder_bio", widget: "text" }
          - { label: "Founder Image", name: "founder_image", widget: "image", required: false }
          - { label: "Address", name: "address", widget: "string", default: "Shop# 18B, Mall of Lahore, Tufail Road, Lahore Cantt, Pakistan" }
          - { label: "Phone 1", name: "phone1", widget: "string", default: "+923214250911" }
          - { label: "Phone 2", name: "phone2", widget: "string", default: "+923214917028" }
          - { label: "Email", name: "email", widget: "string", default: "alnoorphotographers@gmail.com" }
          - { label: "Facebook URL", name: "facebook", widget: "string", default: "https://www.facebook.com/profile.php?id=100064331273895" }
          - { label: "Instagram URL", name: "instagram", widget: "string", default: "https://www.instagram.com/alnoorphotographersofficial/" }
          - { label: "TikTok URL", name: "tiktok", widget: "string", default: "https://www.tiktok.com/@alnooorphotophers" }

  - name: "services_data"
    label: "Services"
    files:
      - name: "services_file"
        label: "Services Data"
        file: "data/services.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Cover Image", name: "cover_image", widget: "image", required: false }

  - name: "galleries_data"
    label: "Galleries"
    files:
      - name: "galleries_file"
        label: "Galleries Data"
        file: "data/galleries.json"
        fields:
          - label: "Galleries"
            name: "galleries"
            widget: "list"
            fields:
              - { label: "Gallery Title", name: "title", widget: "string" }
              - { label: "Cover Image", name: "cover_image", widget: "image" }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Alt Text", name: "alt_text", widget: "string", required: false }

  - name: "testimonials_data"
    label: "Testimonials"
    files:
      - name: "testimonials_file"
        label: "Testimonials Data"
        file: "data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Avatar", name: "avatar", widget: "image", required: false }
              - { label: "Star Rating", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
              - { label: "Feedback", name: "feedback", widget: "text" }
